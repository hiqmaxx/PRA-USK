<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris Barang Kantor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Custom -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header text-center">
    📦SISTEM INVENTARIS BARANG KANTOR
</div>

<div class="container mt-5">
    <div class="row">

        <!-- KIRI (FORM) -->
        <div class="col-md-5">
            <div class="card p-4 mb-4">
                <h5>Tambah Barang</h5>

                <form id="formBarang">
                    <div class="mb-3">
                        <label>Nama Barang</label>
                        <input type="text" id="namaBarang" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Jumlah</label>
                        <input type="number" id="jumlahBarang" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Kategori</label>
                        <select id="kategoriBarang" class="form-select">
                            <option value="">-- Pilih Kategori --</option>
                            <option value="Elektronik">Elektronik</option>
                            <option value="ATK">ATK</option>
                            <option value="Furniture">Furniture</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Simpan Barang
                    </button>
                </form>
            </div>
        </div>

        <!-- KANAN (TABEL) -->
        <div class="col-md-7">
            <div class="card p-4">
                <h5>Daftar Barang Inventaris</h5>

                <table class="table mt-3">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Jumlah</th>
                            <th>Kategori</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="tabelBarang"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
